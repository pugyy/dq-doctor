services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: dqdemo
      MYSQL_USER: dquser
      MYSQL_PASSWORD: dqpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
