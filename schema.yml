# Note: range tests use dbt_utils.expression_is_true. Install dbt-utils package to enable them.
version: 2
models:
- name: dirty_orders
  description: ''
  columns:
  - name: order_id
    description: ''
    meta:
      semantic_type: identifier
    tests:
    - not_null
    - unique
    - dbt_utils.expression_is_true:
        expression: order_id >= 1
    - dbt_utils.expression_is_true:
        expression: order_id <= 20
  - name: user_id
    description: ''
    meta:
      semantic_type: identifier
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: user_id >= 1
    - dbt_utils.expression_is_true:
        expression: user_id <= 99
  - name: status
    description: ''
    meta:
      semantic_type: category
    tests:
    - accepted_values:
        values:
        - cancelled
        - delivered
        - pending
        - shipped
        - unknown_status
  - name: total_amount
    description: ''
    meta:
      semantic_type: measure
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: total_amount >= -200.0
    - dbt_utils.expression_is_true:
        expression: total_amount <= 99999.99
  - name: payment_method
    description: ''
    meta:
      semantic_type: category
    tests:
    - accepted_values:
        values:
        - alipay
        - bitcoin
        - cash
        - credit_card
        - wechat
  - name: created_at
    description: ''
    meta:
      semantic_type: timestamp
    tests:
    - not_null
  - name: updated_at
    description: ''
    meta:
      semantic_type: timestamp
    tests:
    - not_null
