# dq-doctor configuration
db: examples/ecommerce/demo.duckdb

tables:
  orders:
    freshness:
      created_at:
        max_age_hours: 48
    disable_rules:
      - range:user_id
    severity:
      order_id:not_null: high
    sql_rules:
      - name: order_amount_positive
        query: "SELECT COUNT(*) FROM orders WHERE total_amount <= 0"
        expect: 0
