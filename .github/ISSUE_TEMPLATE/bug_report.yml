name: Bug Report
description: Report a bug in dq-doctor
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: dq-doctor version
      description: Run `pip show dq-doctor` to find the version.
      placeholder: "0.7.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database backend
      description: DuckDB, PostgreSQL, or MySQL?
      placeholder: "DuckDB"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact dqdoctor command that caused the issue.
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the full traceback or error message.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other details (OS, config file, sample data, etc.).
